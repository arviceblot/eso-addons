on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

name: CI
permissions:
  contents: read
  pull-requests: write

env:
  CARGO_TERM_COLOR: always
  PROJECT_NAME: ${{ github.event.repository.name }}
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings
  ZIGLANG_VERSION: "0.16.0"

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Add rustfmt problem matcher
        run: echo "::add-matcher::.github/problem-matchers/rustfmt.json"
      - name: Cargo fmt (check)
        run: cargo fmt --all -- --check

  clippy:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - name: Add clippy problem matcher
        run: echo "::add-matcher::.github/problem-matchers/clippy.json"
      - name: Cargo check
        run: cargo check --workspace --all-targets --all-features
      - name: Cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - name: Add test problem matcher
        run: echo "::add-matcher::.github/problem-matchers/test.json"
      - name: Cargo test
        run: cargo test --all -- --nocapture

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - name: Add rustc problem matcher
        run: echo "::add-matcher::.github/problem-matchers/rustc.json"
      - name: Cargo build (release)
        run: cargo build --workspace --release

  appimage:
    name: AppImage smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - name: Install Zig and cargo-zigbuild
        run: |
          pip3 install --break-system-packages ziglang==${ZIGLANG_VERSION}
          cargo install --locked cargo-zigbuild
      - name: Build AppImage
        run: ./scripts/build-appimage.sh
      - name: Smoke test AppImage (X11 and Wayland)
        run: |
          ./scripts/smoke-deps.sh
          ./scripts/smoke-appimage.sh
