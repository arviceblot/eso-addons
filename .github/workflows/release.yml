on:
  push:
    tags:
      - "v*"

name: Create Release
env:
  PROJECT_NAME: eso-addon-manager
  # glibc floor for Linux builds; 2.28 covers RHEL 8, Debian 10+, Ubuntu 18.04+.
  GLIBC_VERSION: "2.28"
  ZIGLANG_VERSION: "0.16.0"

jobs:
  build:
    name: Build application
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - build: linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

          - build: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Zig and cargo-zigbuild (Linux)
        if: matrix.build == 'linux'
        run: |
          pip3 install --break-system-packages ziglang==${ZIGLANG_VERSION}
          cargo install --locked cargo-zigbuild

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      # Test before Build so zigbuild is the last to link the binary, keeping the glibc floor.
      - name: Test binary "${{ matrix.target }}"
        run: cargo test --release --target=${{ matrix.target }}

      - name: Build binary "${{ matrix.target }}"
        if: matrix.build == 'linux'
        run: cargo zigbuild --release --target=${{ matrix.target }}.${{ env.GLIBC_VERSION }}

      - name: Build binary "${{ matrix.target }}"
        if: matrix.build != 'linux'
        run: cargo build --release --target=${{ matrix.target }}

      - name: Rename binary file
        shell: bash
        run: |
          origin="$(find target/${{ matrix.target }}/release -maxdepth 1 -perm -111 -iname "${{ env.PROJECT_NAME }}*")"
          dest="${origin/${{ env.PROJECT_NAME}}/${{ env.PROJECT_NAME}}-${{ matrix.target}}}"
          mv "$origin" "$dest"

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: ./target/${{ matrix.target }}/release/${{ env.PROJECT_NAME }}-${{ matrix.target }}*

  build_appimage:
    name: Build AppImage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Zig and cargo-zigbuild
        run: |
          pip3 install --break-system-packages ziglang==${ZIGLANG_VERSION}
          cargo install --locked cargo-zigbuild

      - name: Build AppImage
        env:
          VERSION: ${{ github.ref_name }}
        run: ./scripts/build-appimage.sh

      - name: Smoke test AppImage (X11 and Wayland)
        run: |
          ./scripts/smoke-deps.sh
          ./scripts/smoke-appimage.sh

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: appimage
          path: |
            dist/${{ env.PROJECT_NAME }}-*-x86_64.AppImage
            dist/${{ env.PROJECT_NAME }}-*-x86_64.AppImage.zsync

  build_macos_universal:
    name: Build macOS universal
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Ensure macOS Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Make universal binary
        run: |
          mkdir -p target/universal/release
          lipo -create \
            target/aarch64-apple-darwin/release/${{ env.PROJECT_NAME }} \
            target/x86_64-apple-darwin/release/${{ env.PROJECT_NAME }} \
            -output target/universal/release/${{ env.PROJECT_NAME }}-universal-macos

      - name: Upload macOS universal
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PROJECT_NAME }}-macos-universal
          path: target/universal/release/${{ env.PROJECT_NAME }}-universal-macos

  release_and_publish:
    name: Create release and publish
    needs: [build, build_appimage, build_macos_universal]
    runs-on: ubuntu-latest
    steps:
      - name: Get the release version from the tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create Release And Publish These Artifacts
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ env.VERSION }}
          files: |
            artifacts/*/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
