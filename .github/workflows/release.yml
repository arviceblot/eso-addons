on:
  push:
    tags:
      - "v*"

name: Create Release
env:
  PROJECT_NAME: eso-addon-manager

jobs:
  build:
    name: Build application
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - build: linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-musl

          - build: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt update && sudo apt install -y musl-tools

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build binary "${{ matrix.target }}"
        run: cargo build --release --target=${{ matrix.target }}

      - name: Test binary "${{ matrix.target }}"
        run: cargo test --release --target=${{ matrix.target }}

      - name: Rename binary file
        shell: bash
        run: |
          origin="$(find target/${{ matrix.target }}/release -maxdepth 1 -perm -111 -iname "${{ env.PROJECT_NAME }}*")"
          dest="${origin/${{ env.PROJECT_NAME}}/${{ env.PROJECT_NAME}}-${{ matrix.target}}}"
          mv "$origin" "$dest"

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: ./target/${{ matrix.target }}/release/${{ env.PROJECT_NAME }}-${{ matrix.target }}*

  build_appimage:
    name: Build AppImage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install packages
        run: |
          sudo apt update
          sudo apt install -y zsync musl-tools
          cargo install cargo-appimage

      - name: Install appimagetool
        run: |
          curl -LO https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          install -m 755 appimagetool-x86_64.AppImage /usr/local/bin/appimagetool
          rm ./appimagetool-x86_64.AppImage

      - name: Add Rust target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Build binary
        run: cargo appimage --target=x86_64-unknown-linux-musl

      - name: Rename AppImage to match zsync update pattern
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          NEW_NAME="${PROJECT_NAME}-${VERSION}-x86_64.AppImage"
          cd target/appimage
          mv "${PROJECT_NAME}.AppImage" "${NEW_NAME}"
          rm -f "${PROJECT_NAME}.AppImage.zsync"
          zsyncmake "${NEW_NAME}"

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: appimage
          path: |
            target/appimage/${{ env.PROJECT_NAME }}-*-x86_64.AppImage
            target/appimage/${{ env.PROJECT_NAME }}-*-x86_64.AppImage.zsync

  build_macos_universal:
    name: Build macOS universal
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Ensure macOS Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Make universal binary
        run: |
          mkdir -p target/universal/release
          lipo -create \
            target/aarch64-apple-darwin/release/${{ env.PROJECT_NAME }} \
            target/x86_64-apple-darwin/release/${{ env.PROJECT_NAME }} \
            -output target/universal/release/${{ env.PROJECT_NAME }}-universal-macos

      - name: Upload macOS universal
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PROJECT_NAME }}-macos-universal
          path: target/universal/release/${{ env.PROJECT_NAME }}-universal-macos

  release_and_publish:
    name: Create release and publish
    needs: [build, build_appimage, build_macos_universal]
    runs-on: ubuntu-latest
    steps:
      - name: Get the release version from the tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Create Release And Publish These Artifacts
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ env.VERSION }}
          files: |
            artifacts/*/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
